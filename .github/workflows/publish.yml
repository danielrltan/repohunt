name: Publish

# Publishes to npm on a version tag (e.g. v0.1.0). Gated on a green build +
# tests. Requires an NPM_TOKEN repo secret (npmjs.com → Access Tokens →
# Automation). Uses npm provenance, which needs id-token: write.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Publish to npm (skip if this version is already published)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "repohunt@$VERSION" version >/dev/null 2>&1; then
            echo "repohunt@$VERSION is already on npm — skipping publish."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
